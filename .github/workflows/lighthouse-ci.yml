name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Performance budget gate: fails the build if the landing page drops
      # below 90, LCP/TBT/CLS regress past their thresholds, or script
      # weight grows beyond budget (see lighthouserc.json).
      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun
